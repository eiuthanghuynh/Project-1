<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fast Feast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" type="text/css" href="./static/outline.css">
    <link rel="stylesheet" type="text/css" href="./static/menu.css">
    <link rel="stylesheet" type="text/css" href="./static/combo.css">
</head>

<body>
    <header>
        <nav class="head-menu">
            <div class="wrapper container d-flex align-items-center justify-content-between">
                <a href="./Home.html" class="logo"><img src="./assets/Fast.png" alt=""></a>
                <ul class="primary-menu">
                    <li><a href="./Home.html">HOME</a></li>
                    <li><a href="./Menu.html">MENU</a></li>
                    <li><a href="./combo.html">COMBO</a></li>
                </ul>
                <div id="cartWrapper">
                    <a href="./Cart.html" class="basket-shopping" id="basket">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <span id="countCart">0</span>
                    </a>
                    <div id="cart">
                        <div class="arrow-up"></div>
                        <div class="container" id="item">
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <div class="container">
                <h1 class="product-stratergy">Combo - Ưu đãi</h1>
                <div class="row" id="list-combo">
                </div>
            </div>
        </section>

        <div class="modal fade" id="comboModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-xl">
                <div class="modal-content" data-id="" data-img="" data-title="" data-price="" data-description="">
                    <div class="container">
                        <div class="row">
                            <div class="col-md-7">
                                <img src="" alt="" style="width:100%;" id="modalImg" class="modal-food-img">
                            </div>
                            <div class="col-md-5" id="modalInfor">
                                <div class="modal-header">
                                    <h1 id="modalTitle"></h1>
                                    <p id="modalDescription"></p>
                                    <p id="modalPrice" data-price=""></p>
                                </div>
                                <div id="close">
                                    <i class="fa-solid fa-xmark"></i>
                                </div>
                                <div class="modal-body">
                                    <form action="" id="foodForm">
                                        <div id="all-food">
                                            <h2 class="modal-body-title">GHI CHÚ</h2>
                                            <textarea name="note" id="foodNote" rows="2" cols="55" class="note-input"
                                                placeholder="Nhập ghi chú của bạn tại đây"></textarea>
                                        </div>
                                    </form>
                                </div>
                                <div class="modal-footer">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="quantity-box d-flex align-items-center">
                                                <button
                                                    class="btn btn-outline-secondary btn-minus modalMinus">-</button>
                                                <input class="form-control mx-2 foodQty" value="1" min="1"
                                                    style="width: 60px; text-align: center;" readonly>
                                                <button class="btn btn-outline-secondary btn-plus modalPlus">+</button>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <p id="addToCart">Thêm vào giỏ hàng</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-3">
                    <a href=""><img src="./assets/Fast.png" alt="" class="end-logo"></a>
                </div>
                <div class="col-md-5">
                    <i class="fa-solid fa-phone"></i>
                    HOTLINE
                    <p class="hotline">1900 0089</p>
                </div>
                <div class="col-md-4">
                    <div class="row">
                        <div class="col-md-6 footer-navigation">
                            <ul>
                                <li><a href="">About Us</a></li>
                                <li><a href="">Blog</a></li>
                                <li><a href="">Career</a></li>
                                <li><a href="">Privacy Policy</a></li>
                            </ul>
                        </div>
                        <div class="col-md-6 footer-navigation">
                            <ul>
                                <li><a href="">Menu</a></li>
                                <li><a href="">Deals</a></li>
                                <li><a href="">E-Voucher</a></li>
                                <li><a href="">Location</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="advert">
                <div class="row">
                    <div class="col-md-6">
                        <p> &copy; 2025 Fast Feast's Food Vietnam | <a href="">Privacy Policy</a></p>
                    </div>
                    <div class="col-md-6 social-icon">
                        <a href=""><i class="fa-brands fa-facebook"></i></a>
                        <a href=""><i class="fa-brands fa-instagram"></i></a>
                        <a href=""><i class="fa-brands fa-youtube"></i></a>
                        <a href=""><i class="fa-regular fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/combo.js"></script>
    <script src="./js/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
