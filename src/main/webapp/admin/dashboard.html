<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fastfeast - Trang Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="static/admin/dashboard.css">
    <link rel="stylesheet" type="text/css" href="static/manage.css">
</head>

<body>
    <div class="container-fluid">

        <div class="page-header mb-4">
            <h2 class="page-title">Tổng quan hệ thống <span style="font-weight: bold; color: #ff7d01">Fastfeast</span>
            </h2>
        </div>

        <div class="row g-3 mb-4">

            <div class="col-md-3">
                <div class="dashboard-card">
                    <div class="card-label">Doanh thu</div>
                    <div class="card-value" id="kpiRevenue">0đ</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <div class="card-label">Tổng đơn hàng</div>
                    <div class="card-value" id="kpiTotalOrders">0</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <div class="card-label">Đang xử lý</div>
                    <div class="card-value card-value-pending" id="kpiProcessing">0</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <div class="card-label">Đã hủy</div>
                    <div class="card-value card-value-cancelled" id="kpiCancelled">0</div>
                </div>
            </div>

        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="content-box">
                    <div class="box-header">
                        <h4>Thống kê đơn hàng</h4>
                    </div>
                    <div class="box-body">
                        <div class="d-flex gap-2 mb-3" id="chartRangeButtons">
                            <button class="btn btn-sm btn-outline-primary active" data-range="7d">7 ngày</button>
                            <button class="btn btn-sm btn-outline-primary" data-range="30d">30 ngày</button>
                            <button class="btn btn-sm btn-outline-primary" data-range="3m">3 tháng</button>
                            <button class="btn btn-sm btn-outline-primary" data-range="6m">6 tháng</button>
                            <button class="btn btn-sm btn-outline-primary" data-range="1y">1 năm</button>
                        </div>

                        <canvas id="orderStatusChartPlaceholder"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="content-box">
                    <div class="box-header">
                        <h4>Đơn hàng gần đây</h4>
                    </div>
                    <div class="box-body">
                        <table class="custom-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên khách hàng</th>
                                    <th>Tình trạng</th>
                                    <th>Thời gian đặt hàng</th>
                                </tr>
                            </thead>
                            <tbody id="recentOrdersTable">

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <!-- <div class="content-box">
            <div class="box-header">
                <h4>Sản phẩm bán chạy</h4>
            </div>
            <div class="box-body">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Số lượng bán</th>
                        </tr>
                    </thead>
                    <tbody id="topProductsTable">

                    </tbody>
                </table>
            </div>
        </div> -->

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.js"
        integrity="sha512-D4pL3vNgjkHR/qq+nZywuS6Hg1gwR+UzrdBW6Yg8l26revKyQHMgPq9CLJ2+HHalepS+NuGw1ayCCsGXu9JCXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/admin/dashboard.js"></script>
    <script src="js/admin/chart/dashboardChart.js"></script>
</body>

</html>
